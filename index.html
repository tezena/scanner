<!DOCTYPE html>
<html>
<head>
    <title>Attendance Scanner Pro</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f2f5; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #reader { width: 100%; border-radius: 10px; overflow: hidden; }
        #status { margin-top: 20px; padding: 15px; font-weight: bold; border-radius: 8px; }
        .success { background: #d4edda; color: #155724; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Attendance Scanner</h2>
        <div id="reader"></div>
        <div id="status">Waiting for camera...</div>
    </div>

    <script>
        const SCRIPT_URL = "YOUR_WEB_APP_URL_HERE"; 

        function onScanSuccess(decodedText) {
            document.getElementById('status').innerHTML = "✅ Scanned: " + decodedText;
            
            fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors", 
                body: JSON.stringify({ id: decodedText })
            }).then(() => {
                document.getElementById('status').innerHTML = "✅ Logged to Sheet!";
                setTimeout(() => { document.getElementById('status').innerHTML = "Ready for next scan"; }, 3000);
            });
        }

        // Fix: Use the standard initialization without extra parameters
        const html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
            fps: 10, 
            qrbox: 250 
        });
        
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
