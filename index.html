<!DOCTYPE html>
<html>
<head>
    <title>Attendance Scanner Pro 2</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; background: #f0f2f5; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #reader { width: 100%; border-radius: 10px; overflow: hidden; }
        #status { margin-top: 20px; padding: 15px; font-weight: bold; border-radius: 8px; min-height: 20px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Attendance Scanner</h2>
        <div id="reader"></div>
        <div id="status">Ready to scan...</div>
    </div>

    <script>
        // 1. PASTE YOUR GOOGLE WEB APP URL HERE (The one from Step 1)
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwiqmspVmu4BairLzu1-l24klITbJqR48d0guZ_b5y42BwTnuULrf81dDcJROs-tP6GnA/exec"; 

        function onScanSuccess(decodedText) {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = "Processing ID: " + decodedText + "...";
            statusDiv.className = "";

            // Send data to Google Sheets via POST
            fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors", 
                body: JSON.stringify({ id: decodedText }),
                headers: { "Content-Type": "text/plain" }
            })
            .then(() => {
                statusDiv.innerHTML = "✅ SUCCESS: " + decodedText + " logged!";
                statusDiv.className = "success";
                // Reset after 3 seconds
                setTimeout(() => { statusDiv.innerHTML = "Ready for next scan"; statusDiv.className = ""; }, 3000);
            })
            .catch(err => {
                statusDiv.innerHTML = "❌ Connection Error";
                statusDiv.className = "error";
            });
        }

        // 2. This is the fix for the cameraIdOrConfig error
        const html5QrcodeScanner = new Html5QrcodeScanner(
            "reader", 
            { 
                fps: 10, 
                qrbox: { width: 250, height: 250 },
                rememberLastUsedCamera: true
            }, 
            /* verbose= */ false
        );
        
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
