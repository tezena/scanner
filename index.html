<!DOCTYPE html>
<html>
<head>
    <title>Attendance Scanner Pro</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f2f5; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #reader { width: 100%; border-radius: 10px; overflow: hidden; }
        #status { margin-top: 20px; padding: 15px; font-weight: bold; border-radius: 8px; }
        .success { background: #d4edda; color: #155724; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Attendance Scanner</h2>
        <div id="reader"></div>
        <div id="status">Waiting for camera...</div>
    </div>

    <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwNMu5Evilg19d-Sm2zF_0e_ReP9Krjzdc7RFePBJ7lSKZYdtzaCY9ov5O70sxa3aASbw/exec"; 
    const statusDiv = document.getElementById('status');
    let isProcessing = false;

    function onScanSuccess(decodedText) {
        if (isProcessing) return; // Ignore multiple reads while processing
        isProcessing = true;
        
        // 1. Pause the scanner visually
        statusDiv.innerHTML = "Processing... Please wait.";
        statusDiv.className = "";

        // 2. Send data using a GET request (Cleaner for Google Apps Script redirects)
        // We use a trick to bypass CORS by using a hidden image or simple fetch
        fetch(SCRIPT_URL + "?id=" + decodedText)
        .then(response => response.json())
        .then(data => {
            statusDiv.innerHTML = data.message;
            statusDiv.className = data.status === "success" ? "success" : "error";
            
       
            setTimeout(() => {
                isProcessing = false;
                statusDiv.innerHTML = "Ready for next scan";
                statusDiv.className = "";
            }, 5000);
        })
        .catch(err => {
            // Because of CORS, the catch might trigger even if it works. 
            // If it logs to your sheet, it worked!
            statusDiv.innerHTML = "Check Sheet for Status";
            setTimeout(() => { isProcessing = false; }, 3000);
        });
    }

    const html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
    html5QrcodeScanner.render(onScanSuccess);
</script>
</body>
</html>
